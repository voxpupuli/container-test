---
# Managed by modulesync - DO NOT EDIT
# https://voxpupuli.org/docs/updating-files-managed-with-modulesync/

name: 🚦 CI

# yamllint disable-line rule:truthy
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup-matrix:
    name: Set up build matrix
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.build-matrix.outputs.build-matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install yq
        uses: dcarbone/install-yq-action@v1.3.1

      - name: Generate build matrix
        id: build-matrix
        run: echo "build-matrix=$(yq -o=json build_versions.yaml | jq -c)" >> "$GITHUB_OUTPUT"

  build-container:
    name: Build test container
    runs-on: ubuntu-latest
    needs:
      - setup-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.build-matrix) }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          tags: 'ci/test:${{ matrix.puppet_release }}'
          push: false
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}

  tests:
    name: Test suite
    if: always()
    needs:
      - setup-matrix
      - build-container
    runs-on: ubuntu-24.04
    steps:
      - name: Verify required jobs
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

  save-pr-number:
    name: Save PR number
    runs-on: ubuntu-latest
    steps:
      - name: Write PR number
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: |
          mkdir -p pr
          echo "$PR_NUMBER" > pr/pr_number

      - name: Upload PR number
        uses: actions/upload-artifact@v7
        with:
          name: pr_number
          path: pr/

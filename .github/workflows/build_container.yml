---
# Managed by modulesync - DO NOT EDIT
# https://voxpupuli.org/docs/updating-files-managed-with-modulesync/

name: 📦 Build and Publish

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: build-and-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup-matrix:
    name: Set up build matrix
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.build-matrix.outputs.build-matrix }}
      manifest-matrix: ${{ steps.manifest-matrix.outputs.manifest-matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install yq
        uses: dcarbone/install-yq-action@v1.3.1

      - name: Generate build matrix
        id: build-matrix
        run: |
          matrix_json=$(bash matrix.sh build)
          echo "build-matrix=$matrix_json" >> "$GITHUB_OUTPUT"

      - name: Generate manifest matrix
        id: manifest-matrix
        run: |
          matrix_json=$(bash matrix.sh tag)
          echo "manifest-matrix=$matrix_json" >> "$GITHUB_OUTPUT"

  build-and-push-container:
    name: Build ci container ${{ matrix.puppet_release }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs:
      - setup-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.build-matrix) }}
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build and publish container
        id: build
        uses: voxpupuli/gha-build-and-publish-a-container@v2
        with:
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          build_args: |
            BASE_IMAGE=${{ matrix.base_image }}
          build_arch: linux/${{ matrix.platform }}
          build_context: .
          buildfile: Dockerfile
          tags: |
            ghcr.io/${{ github.repository_owner }}/test:${{ github.sha }}-v${{ matrix.puppet_release }}-${{ matrix.platform }}

      - name: Attest image
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/test:${{ github.sha }}-v${{ matrix.puppet_release }}-${{ matrix.platform }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  create-multiarch-manifests:
    name: Create multi-architecture manifests
    runs-on: ubuntu-latest
    needs:
      - setup-matrix
      - build-and-push-container
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.manifest-matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: voxpupulibot
          password: ${{ secrets.DOCKERHUB_BOT_ADMIN_TOKEN }}

      - name: Create multi-architecture manifests
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository_owner }}/test:v${{ matrix.puppet_release }}-latest -t docker.io/${{ github.repository_owner }}/test:v${{ matrix.puppet_release }}-latest ghcr.io/${{ github.repository_owner }}/test:${{ github.sha }}-v${{ matrix.puppet_release }}-amd64 ghcr.io/${{ github.repository_owner }}/test:${{ github.sha }}-v${{ matrix.puppet_release }}-arm64

  update-dockerhub-description:
    name: Update Docker Hub description
    runs-on: ubuntu-latest
    needs:
      - create-multiarch-manifests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: voxpupulibot
          password: ${{ secrets.DOCKERHUB_BOT_ADMIN_TOKEN }}
          repository: voxpupuli/test
